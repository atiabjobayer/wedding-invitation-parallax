<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bair & Shimi | We're Getting Married</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

  <section class="hero">

    <div class="bg-pattern"></div>
    <div class="bg-fade"></div>

    <div class="top-text">
      <p class="eyebrow">We're Getting Married</p>
      <h1 class="names" id="namesText">Bair <span class="amp">&amp;</span> Shimi</h1>
    </div>

    <div class="hands-stage">
      <img id="groomhand" class="hand groom-hand" src="images/groomhand.png">
      <img id="bridehand" class="hand bride-hand" src="images/bridehand.png">
      <img id="groomhandcut" class="hand groom-hand-cut" src="images/groomhandcut.png">
    </div>

    <div class="join-block" id="joinBlock">
      <p class="join-us" id="joinus">Join Us</p>
      <div class="details-row">
        <div class="detail" id="dateDetail">
          <span class="label">Date</span>
          <span class="value">08.08.2026</span>
        </div>
        <div class="detail" id="timeDetail">
          <span class="label">Time</span>
          <span class="value">1:00 PM</span>
        </div>
      </div>
      <div id="locationDetail">
        <p class="address-line">1277 Carolyn Dr NE</p>
        <p class="address-sub">Atlanta, GA 30329</p>
      </div>
    </div>

    <!-- <div class="bottom-text">
    </div> -->

  </section>

  <script src="script.js"></script>
</body>
</html>
