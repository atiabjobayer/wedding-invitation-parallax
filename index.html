<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bair &amp; Shimi | We're Getting Married</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <section class="hero">

    <!-- LAYER 0: base gradient (in CSS) -->
    <!-- LAYER 1: bbg.png artwork background, present from load -->
    <div class="bg-big" id="bgBig"></div>
    <div class="bg-pattern"></div>
    <div class="bg-fade"></div>

    <!-- LAYER 2: flowers drifting in from the sides -->
    <div class="flowers" id="flowers">
      <img class="flower f1" id="f1" src="images/objects/f1.png" alt="">
      <img class="flower f2" id="f2" src="images/objects/f2.png" alt="">
      <img class="flower f3" id="f3" src="images/objects/f3.png" alt="">
      <img class="flower f4" id="f4" src="images/objects/f4.png" alt="">
      <img class="flower f5" id="f5" src="images/objects/f5.png" alt="">
      <img class="flower f6" id="f6" src="images/objects/f6.png" alt="">
    </div>

    <!-- LAYER 3: all the wedding text, as artwork. ABOVE the background,
         BELOW the hands. Fully visible on load; fades out on scroll. -->
    <img class="all-text" id="allText"
         src="images/texts/all_text.png"
         alt="You are invited to the wedding of Bair Srivastav and Shimi Afsara. Saturday 08 August, 1pm. 1277 Carolyn Dr NE Atlanta 30329. Attire is dressy casual, light colors are preferred.">

    <!-- LAYER 4: the hand stack -->
    <div class="hands-stage" id="handsStage">
      <img id="groomhand"    class="hand groom-hand"     src="images/groomhand.png" alt="">
      <img id="bridehand"    class="hand bride-hand"     src="images/bridehand.png" alt="">
      <img id="groomhandcut" class="hand groom-hand-cut" src="images/groomhandcut.png" alt="">
    </div>

    <div class="scroll-cue" id="scrollCue">
      <span></span>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
